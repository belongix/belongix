<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Belongix App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icons/icon-32.png"/>
<meta name="theme-color" content="#2D1B69"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Belongix"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;450;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{--brand:#2D1B69;--brand2:#4C2FAA;--accent:#FF5C35;--ff:'Sora',sans-serif;--ffb:'DM Sans',sans-serif}
body{font-family:var(--ffb);background:#FAFAFE;color:#0D0D1A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:linear-gradient(rgba(45,27,105,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(45,27,105,.05) 1px,transparent 1px);background-size:52px 52px}
.app-wrap{text-align:center;max-width:400px;width:100%}
.app-logo{font-family:var(--ff);font-size:32px;font-weight:800;color:var(--brand);letter-spacing:-.5px;margin-bottom:8px}
.app-logo span{color:var(--accent)}
.app-tagline{font-size:15px;color:#5A5A7A;margin-bottom:32px;line-height:1.5}
.app-card{background:#fff;border:1px solid #E4E4F0;border-radius:20px;padding:32px;box-shadow:0 8px 40px rgba(45,27,105,.1)}
.app-card h2{font-family:var(--ff);font-size:20px;font-weight:800;color:#0D0D1A;margin-bottom:6px}
.app-card p{font-size:13px;color:#5A5A7A;margin-bottom:24px;line-height:1.5}
.m-inp{width:100%;padding:11px 14px;border:1.5px solid #E4E4F0;border-radius:10px;font-size:14px;font-family:var(--ffb);color:#0D0D1A;outline:none;margin-bottom:11px;transition:.15s}
.m-inp:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(45,27,105,.08)}
.m-btn{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--ffb);transition:.2s;margin-bottom:10px}
.m-btn:hover{background:var(--brand2)}
.m-google{width:100%;padding:11px;background:#fff;border:1.5px solid #E4E4F0;border-radius:10px;font-size:13.5px;font-weight:500;cursor:pointer;font-family:var(--ffb);display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;color:#1A1A2E}
.m-google:hover{border-color:#D0D0E8;background:#F7F7FC}
.m-tabs{display:flex;gap:2px;background:#F7F7FC;border-radius:10px;padding:3px;margin-bottom:20px}
.m-tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#5A5A7A;transition:.15s;border:none;background:none;font-family:var(--ffb)}
.m-tab.active{background:#fff;color:var(--brand);font-weight:700;box-shadow:0 1px 4px rgba(45,27,105,.1)}
.m-ok{display:none;background:#ECFDF5;border:1px solid #6EE7B7;border-radius:8px;padding:10px;text-align:center;font-size:13px;color:#065F46;font-weight:600;margin-top:10px}
.m-fine{font-size:11.5px;color:#8B8BA8;text-align:center;margin-top:11px}
.skip-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:#8B8BA8;cursor:pointer;text-decoration:none}
.skip-link:hover{color:var(--brand)}
.checking{text-align:center;padding:40px 0}
.check-spin{width:36px;height:36px;border:3px solid #E4E4F0;border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app-wrap">
  <div class="app-logo">Belong<span>ix</span></div>
  <div class="app-tagline">Your professional career, upgraded.</div>

  <div class="app-card" id="auth-card">
    <h2>Welcome back</h2>
    <p>Sign in to access your career dashboard, job board and Bexi AI.</p>
    <div class="m-tabs">
      <button class="m-tab active" id="tab-si" onclick="appTab('signin')">Sign In</button>
      <button class="m-tab" id="tab-su" onclick="appTab('signup')">Sign Up</button>
    </div>
    <div id="app-signin">
      <input class="m-inp" type="email" id="a-si-email" placeholder="Email address"/>
      <input class="m-inp" type="password" id="a-si-pass" placeholder="Password"/>
      <button class="m-btn" onclick="appAuth('signin')">Sign In →</button>
    </div>
    <div id="app-signup" style="display:none">
      <input class="m-inp" type="email" id="a-su-email" placeholder="Email address"/>
      <input class="m-inp" type="password" id="a-su-pass" placeholder="Password (min 6 chars)"/>
      <button class="m-btn" onclick="appAuth('signup')">Create Account →</button>
    </div>
    <button class="m-google" onclick="googleAuth()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="m-ok" id="app-ok"></div>
    <div class="m-fine">By signing up you agree to our Terms &amp; Privacy Policy.</div>
    <a class="skip-link" href="index.html">← Back to home</a>
  </div>

  <div id="checking-card" style="display:none">
    <div class="app-card">
      <div class="checking">
        <div class="check-spin"></div>
        <div style="font-size:15px;font-weight:600;color:#0D0D1A">Signing you in...</div>
      </div>
    </div>
  </div>
</div>

<script>
var SB_URL='https://efhcfuaxgbzuqlmhlsxc.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmaGNmdWF4Z2J6dXFsbWhsc3hjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDg1NzgsImV4cCI6MjA5MjcyNDU3OH0.vpFvBPnKkrMMONXo9z6FemJ2qIlRChRloQYRB0LMdjY';
var sb=supabase.createClient(SB_URL,SB_KEY);

// Check if already signed in
document.getElementById('auth-card').style.display='none';
document.getElementById('checking-card').style.display='block';
sb.auth.getSession().then(function(r){
  if(r.data&&r.data.session){
    window.location.href='dashboard.html';
  } else {
    document.getElementById('checking-card').style.display='none';
    document.getElementById('auth-card').style.display='block';
  }
});

function appTab(tab){
  document.getElementById('app-signin').style.display=tab==='signin'?'block':'none';
  document.getElementById('app-signup').style.display=tab==='signup'?'block':'none';
  document.getElementById('tab-si').classList[tab==='signin'?'add':'remove']('active');
  document.getElementById('tab-su').classList[tab==='signup'?'add':'remove']('active');
}

async function appAuth(type){
  var email='',pass='';
  if(type==='signin'){email=(document.getElementById('a-si-email')||{}).value||'';pass=(document.getElementById('a-si-pass')||{}).value||'';}
  else{email=(document.getElementById('a-su-email')||{}).value||'';pass=(document.getElementById('a-su-pass')||{}).value||'';}
  if(!email||!pass){alert('Please fill in email and password');return;}
  try{
    var res=type==='signup'?await sb.auth.signUp({email:email,password:pass}):await sb.auth.signInWithPassword({email:email,password:pass});
    if(res.error)throw res.error;
    if(type==='signin'){window.location.href='dashboard.html';}
    else{var ok=document.getElementById('app-ok');if(ok){ok.style.display='block';ok.textContent='Check your email to confirm your account!';}}
  }catch(e){alert('Error: '+e.message);}
}

async function googleAuth(){
  try{await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+'/dashboard.html'}});}
  catch(e){alert('Google auth error: '+e.message);}
}
</script>
</body>
</html>
